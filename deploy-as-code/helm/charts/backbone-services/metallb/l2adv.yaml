apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: public-ip-pool
  namespace: backbone
spec:
  addresses:
    - 192.168.0.86/32
  avoidBuggyIPs: true
  autoAssign: true

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: public-l2
  namespace: backbone
spec:
  ipAddressPools:
    - public-ip-pool
 