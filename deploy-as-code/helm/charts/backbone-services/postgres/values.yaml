labels:
  app: "postgres"
  group: "db"
namespace: egov

image:
  repository: "docker.io/postgres"
  tag: "14"
replicas: "1"
httpPort: 5432
postgresDatabase: egov_ms      

resources: |
  requests:
    cpu: 100m
    memory: 256Mi

tracing-enabled: false

env: |
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name:  POSTGRES_USER
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: POSTGRES_DB
    value: {{ index .Values "postgresDatabase" | quote }}
extraVolumeMounts: |
  - name: postgres-volume
    mountPath: /var/lib/postgresql/data
extraVolumes: |
  - name: postgres-volume
    persistentVolumeClaim:
      claimName: pvc-postgres


