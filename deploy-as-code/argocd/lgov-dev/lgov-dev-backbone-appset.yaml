apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: lgov-dev-backbone
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - service: cert-manager
          - service: elasticsearch-data
          - service: elasticsearch-master
          - service: ingress-nginx
          - service: kafka-kraft
          - service: kibana
          # - service: minio
          # - service: novu
          # - service: oauth2-proxy
          # - service: pgadmin
          # - service: playground
          - service: postgres
          # - service: prometheus-blackbox-exporter
          # - service: prometheus-kafka-exporter
          # - service: prometheus-postgres-exporter
          # - service: redis
          - service: metallb
  template:
    metadata:
      name: "{{service}}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/hemanth-beehyv/iras-DevOps
          targetRevision: master
          path: "deploy-as-code/helm/charts/backbone-services/{{service}}"
          helm:
            # Chart defaults from the service's own values.yaml, overridden by
            # the environment values below (later files win). The secrets file
            # is SOPS/age-encrypted and decrypted in-place by the repo-server's
            # helm-secrets plugin via the secrets+age-import scheme.
            # https://github.com/jkroepke/helm-secrets/wiki/ArgoCD-Integration
            valueFiles:
              - values.yaml
              - ../../../environments/lgov-dev.yaml
              # secrets+age-import://<key-volume-mount>/<key-name>.txt?<relative/path/to/the/encrypted/secrets.yaml>
              - secrets://../../../environments/lgov-dev-secrets.yaml
        - repoURL: https://github.com/hemanth-beehyv/iras-DevOps
          targetRevision: master
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: backbone
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
        retry:
          limit: 100
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m0s